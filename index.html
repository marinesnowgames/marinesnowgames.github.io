<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marine Snow Games</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --deep:   #050f1a;
      --drift:  #c8e6f0;
      --biolum: #5effd8;
    }

    body {
      background: var(--deep);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    h1 {
      position: relative;
      z-index: 1;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(56px, 12vw, 160px);
      line-height: 0.9;
      text-align: center;
      letter-spacing: 0.03em;
      color: var(--drift);
      user-select: none;
    }

    h1 span {
      display: block;
      color: var(--biolum);
    }
  </style>
</head>
<body>

<canvas id="snow"></canvas>

<h1>Marine<span>Snow</span>Games</h1>

<script>
  const canvas = document.getElementById('snow');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const COUNT = 160;
  const particles = Array.from({ length: COUNT }, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.6 + 0.3,
    vx: (Math.random() - 0.5) * 0.18,
    vy: Math.random() * 0.35 + 0.08,
    op: Math.random() * 0.45 + 0.08,
  }));

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const p of particles) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200, 230, 240, ${p.op})`;
      ctx.fill();

      p.x += p.vx;
      p.y += p.vy;

      if (p.y > canvas.height + 2) { p.y = -2; p.x = Math.random() * canvas.width; }
      if (p.x < -2) p.x = canvas.width + 2;
      if (p.x > canvas.width + 2) p.x = -2;
    }
    requestAnimationFrame(draw);
  }

  draw();
</script>
</body>
</html>
